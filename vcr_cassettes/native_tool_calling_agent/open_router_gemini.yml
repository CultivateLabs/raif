        | Massive Black Holes and their Galaxies | 1.5 |\\n| The Transiting Exoplanet
        Community Early Release Science Program | Planets and Planet Formation | 52.1
        |\\n| ERS observations of the Jovian System as a Demonstration of JWST''s
        Capabilities for Solar System Science | Solar System | 9.3 |\\n| High Contrast
        Imaging of Exoplanets and Exoplanetary Systems with JWST | Planets and Planet
        Formation | 18.4 |\\n\\n### General Observer Program\\n[]\\n\\nFor Cycle 1,
        6,000 hours of observation time were available to allocate, and 1,173 proposals
        were submitted requesting a total of 24,500 hours. Selection of Cycle 1 GO
        programs was announced on 30 March 2021, with 266 programs approved. These
        included 13 large programs and treasury programs producing data for public
        access. The Cycle 2 GO program was announced on 10 May 2023. Webb science
        observations are nominally scheduled in weekly increments. The observation
        plan for every week is published on Mondays by the Space Telescope Science
        Institute. In Cycle 4 the telescope showed its continued popularity in the
        astronomy community by garnering 2,377 proposals for 78,000 hours of observing
        time, nine times more than the available amount.\\n\\n## Scientific results\\n[]\\n\\nThe
        JWST completed its commissioning and began full scientific operations on 11
        July 2022. With some exceptions, most experiment data is kept private for
        one year for the exclusive use of scientists running that particular experiment,
        and then the raw data is released to the public.\\n\\nHubble (2017; top) compared
        to Webb (2022; bottom)\\n\\n – \\n\\nJWST observations substantially advanced
        understanding of exoplanets, the first billion years of the universe, and
        other astrophysical and cosmological phenomena.\\n\\n### First full-color
        images\\n[]\\n\\nThe first full-color images and spectroscopic data were released
        on 12 July 2022, marking the official start of Webb''s general science operations.
        U.S. President revealed the first image, , on 11 July 2022. Additional releases
        around this time include:\\n\\n- – young, star-forming region called about
        8,500 light-years from Earth, described by NASA as \\\"Cosmic Cliffs\\\".\\n-
        – including an analysis of atmosphere with evidence of water around a planet
        orbiting a distant star 1,120 light-years from Earth.\\n- – clouds of gas
        and dust expelled by a dying star 2,500 light-years from Earth.\\n- – a visual
        display of five galaxies with colliding gas and dust clouds creating new stars;
        four central galaxies are 290 million light-years from Earth.\\n- – a at redshift
        0.39, with distant background galaxies whose images are distorted and magnified
        due to by the cluster. This image has been called _Webb''s First Deep Field_.
        It was later discovered that in this picture were three ancient galaxies that
        existed shortly after the Big Bang. The images of these distant galaxies are
        views of the universe 13.1 billion years ago.\\n\\nOn 14 July 2022, NASA presented
        images of and related areas by the JWST, including infrared views.\\n\\nIn
        a preprint released around the same time, NASA, ESA, and CSA scientists stated
        that \\\"the science performance of JWST is better than expected\\\". The
        document stated that during commissioning, the instruments captured spectra
        of transiting exoplanets with a precision better than 1000 ppm per data point
        and tracked moving objects at speeds up to 67 milliarcseconds/second, more
        than twice the required speed. It also obtained the spectra of hundreds of
        stars simultaneously in a dense field towards the ''s . Other targets included:\\n\\n-
        Moving targets: and moons (particularly , and ), , , , , , , and \\n- time-series,
        NIRISS SOSS and BOTS mode: the Jupiter-sized planet \\n- NIRISS (AMI): A precise
        detection of the very low-mass companion star C, which had a separation of
        only 0.3 to the primary. This observation was the first demonstration of AMI
        in space.\\n- MIRI low-resolution spectroscopy (LRS): a hot planet (TOI-134)
        around a bright star ( star)\\n\\n### Bright early galaxies\\n[]\\n\\nWithin
        two weeks of the first Webb images, several preprint papers described a wide
        range of high-redshift, very luminous (presumably large) galaxies believed
        to date back to 235 million years (z=16.7) to 280 million years after the
        Big Bang, far earlier than previously known. On 17 August 2022, NASA released
        a large mosaic image of 690 individual frames taken by the NIRCam on Webb
        of numerous very early galaxies. Some early galaxies observed by Webb like
        , which was believed to have an estimated of approximately z=16.7 corresponding
        to 235.8 million years after the Big Bang, are high redshift galaxy candidates.
        However, for CEERS-93316 specifically, a later measurement revealed a more
        accurate redshift value of approximately z=4.91. In September 2022, were proposed
        as explaining these unexpectedly large and early galaxies. In May 2024, the
        JWST identified the most distant known galaxy, , seen just 290 million years
        after the Big Bang, corresponding to a redshift of 14.32. Part of the JWST
        Advanced Deep Extragalactic Survey (JADES), this discovery highlights a galaxy
        significantly more luminous and massive than expected for such an early period.
        Detailed analysis using JWST''s NIRSpec and MIRI instruments revealed this
        galaxy''s remarkable properties, including its significant size and dust content,
        challenging current models of early galaxy formation.\\n\\n_November 2025
        JWST observations confirmed an actively growing supermassive black hole within
        a \\\"\\\" galaxy named CANUCS-LRD-z8.6._\\n\\nIn late 2025, JWST observations
        of high-redshift \\\"\\\" (LRDs) and early galaxies provided constraints favoring
        the existence of massive black hole seeds over standard stellar-remnant models.
        In August 2025, Juodžbalis _et al._ reported a direct dynamical mass measurement
        of a black hole in a strongly lensed LRD galaxy at redshift z=7.04, finding
        a central mass of about 50 million solar masses, outweighing its galaxy''s
        stars. The authors describe it as consistent with formation in the early universe.
        Subsequently, Tripodi _et al._ identified an active galactic nucleus in the
        LRD \\\"CANUCS-LRD-z8.6\\\" at about z=8.6, containing a roughly 108 solar
        mass black hole that had grown rapidly before its host galaxy established
        significant stellar mass, consistent with extremely early formation or . Concurrently,
        Chavez Ortiz _et al._ presented evidence for an active ~107.2 solar mass black
        hole in the galaxy at z=12.34, less than 400 million years after the Big Bang
        — the most distant black hole identified to date — further challenging standard
        accretion limits and supporting rapid formation mechanisms.\\n\\n### Exoplanet
        atmospheres and galactic evolution\\n[]\\n\\nIn May 2026, a study published
        in the journal reported the first detection of a repeating daily cycle on
        a , A b. The observations revealed magnesium silicate clouds forming on the
        planet''s morning side and evaporating on the evening side, which allowed
        for a more accurate characterization of its composition as being five times
        more carbon-rich than . Simultaneously, further phase curve analysis definitively
        ruled out thick atmospheres for the inner planets and , while a study in released
        on May 26 used Webb imagery to demonstrate that the most massive star clusters
        clear their surrounding natal gas clouds significantly faster than smaller
        clusters.\\n\\n## Gallery\\n[]\\n\\n- First images by the James Webb Space
