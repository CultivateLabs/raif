        Notes\\n[]\\n\\n1. ^ JWST was designed with the requirement to track objects
        that move as fast as Mars, which has a maximum apparent speed on the sky of
        30 /s, which is the value given in the technical specification, i.e., the
        nominal value.During commissioning, various asteroids were observed to determine
        the actual limitation for the speed of objects and it turned out to be 67
        mas/s, which is more than twice the nominal value. Tracking at rates of 30–67
        mas/s showed accuracies similar to tracking of slower targets. Thus, the telescope
        can observe also (NEAs), comets closer to perihelion and .: 8 Later, after
        more experience with had been gained, the tracking speed limit was finally
        set to 75 mas/s for routine observations. Higher rates up to 100 mas/s are
        also possible upon special request, as FGS requires multiple guide stars to
        achieve this, which introduces complexity and inefficiency. The first observation
        with a super-fast rate was the impact experiment on 26 September 2022.\\n2.
