        and )\\n\\n |\\n| James Webb Space Telescope mission logo\\n_Astrophysics
        Division_\\n\\n←&nbsp;\\n\\n&nbsp;→\\n\\n |\\n\\nThe **James Webb Space Telescope**
        ( **JWST** ) is a designed to conduct . It is the largest telescope in space,
        and is equipped with high-resolution and high-sensitivity instruments, allowing
        it to view objects too old, distant, or faint for the . This enables investigations
        across many fields of and , such as observation of the and the , and detailed
        atmospheric characterization of .\\n\\nDespite Webb''s mirror diameter being
        2.7 times larger than that of the Hubble Space Telescope, it produces images
        of comparable because it observes in the infrared spectrum, which has longer
        wavelengths than the Hubble''s visible spectrum. The longer the wavelength
        the telescope is designed to observe, the larger the information-gathering
        surface (mirrors in the infrared spectrum or antenna area in the millimeter
        and radio ranges) required to achieve the desired resolution.\\n\\nThe Webb
        was launched on 25 December 2021 on an rocket from , French Guiana. In January
        2022, it arrived at its destination, a solar orbit near the Sun–Earth , about
        1.5&nbsp;million kilometers (930,000&nbsp;mi) from Earth. was released to
        the public on 11 July 2022.\\n\\nThe U.S. (NASA) led Webb''s design and development
        and partnered with two central agencies: the (ESA) and the (CSA). The NASA
        in managed telescope development, while the in on the operates Webb. The primary
        contractor for the project was .\\n\\nThe after , who was the from 1961 to
        1968 during the , , and programs.\\n\\nWebb''s consists of 18 hexagonal made
        of -plated , which together create a 6.5-meter-diameter (21&nbsp;ft) mirror,
        compared with Hubble''s 2.4&nbsp;m (7&nbsp;ft 10&nbsp;in). This gives Webb
        a of about 25&nbsp;m2 (270&nbsp;sq&nbsp;ft), about six times that of Hubble.
        Unlike Hubble, which observes in the , , and spectra (0.1–2.5&nbsp;), Webb
        observes a lower frequency range, from long-wavelength visible light (red)
        through mid-infrared (0.6–28.5&nbsp;μm). The telescope must be kept extremely
        cold, below 50&nbsp;K (−223&nbsp;°C; −370&nbsp;°F), so that the by the telescope
        itself does not interfere with the collected light. Its five-layer protects
        it from warming by the Sun, Earth, and Moon.\\n\\nInitial designs for the
        telescope, then named the Next Generation Space Telescope, began in 1996.
        Two concept studies were commissioned in 1999, for a potential launch in 2007
        and a US$1 billion budget. The program saw enormous cost overruns and delays.
        A significant redesign was carried out in 2005, with construction completed
        in 2016, followed by years of exhaustive testing, at a total cost of US$10
        billion.\\n\\n## Features\\n[]\\n\\nThe mass of the James Webb Space Telescope
        (JWST) is about half that of the . Webb has a 6.5-meter-diameter (21-foot)
        gold-coated beryllium made up of 18 separate hexagonal mirrors. The mirror
        has a polished area of 26.3&nbsp;m2 (283&nbsp;ft2), of which 0.9&nbsp;m2 (9.7&nbsp;ft2)
        is obscured by the secondary support struts, giving a total collecting area
        of 25.4&nbsp;m2 (273&nbsp;ft2). This is over six times larger than the collecting
        area of Hubble''s 2.4&nbsp;m (7.9&nbsp;ft) diameter mirror, which has a collecting
        area of 4.0&nbsp;m2 (43&nbsp;ft2). The mirror has a gold coating to provide
        infrared , covered by a thin layer of glass for durability.\\n\\nWebb is designed
        primarily for near-, but can also detect orange and red visible light and
        the mid-infrared region, depending on the instrument used. It can detect objects
        up to 100 times fainter than Hubble can, and objects much earlier in the ,
        back to z≈20 (about 180 million years after the ). For comparison, the are
        thought to have formed between z≈30 and z≈20 (100–180 million years cosmic
        time), and the first galaxies may have formed around redshift z≈15 (about
        270 million years cosmic time). Hubble is unable to see further back than
        very early at about z≈11.1 (galaxy , 400 million years cosmic time).\\n\\nThe
        design emphasizes the near to mid-infrared for several reasons:\\n\\n- high-redshift
        (very early and distant) objects have their visible emissions shifted into
        the infrared, and therefore their light can be observed only via infrared
        astronomy;\\n- infrared light passes more easily through than visible light;\\n-
        colder objects such as and planets emit most strongly in the infrared;\\n-
        These infrared bands are difficult to study from the ground or by earlier
        space telescopes such as Hubble.\\n\\n_Rough plot of Earth''s (or opacity)
        to various wavelengths of electromagnetic radiation, including_\\n\\nGround-based
        telescopes must look through , which is opaque in many infrared bands (see
        figure at right). Even where the atmosphere is transparent, many of the target
        chemical compounds, such as water, carbon dioxide, and , are present in the
        Earth''s atmosphere and interfere with observations. Existing space telescopes,
        such as Hubble, cannot study these bands since their mirrors are at a temperature
        high enough to emit significant infrared radiation; for example, the Hubble
        mirror is maintained at about 15&nbsp;°C&nbsp;[288&nbsp;K; 59&nbsp;°F], so
        that the telescope itself radiates strongly in the relevant infrared bands.\\n\\nWebb
        can also observe objects in the at angles greater than 85° from the Sun and
        with apparent less than 0.03 arc seconds per second. This includes Mars, Jupiter,
        Saturn, Uranus, Neptune, Pluto, their , and , and at or beyond the . Webb
        has sufficient near-IR and mid-IR sensitivity to be able to observe virtually
        all known . In addition, it can observe opportunistic and unplanned targets
        such as and within 48 hours of a decision to do so.\\n\\n- \\nThree-quarter
        view of the top\\n- \\nBottom (Sun-facing side)\\n\\n### Location and orbit\\n[]\\n\\nWebb
        operates in a , circling a point in space known as the Sun–Earth L2, approximately
        1,500,000&nbsp;km (930,000&nbsp;mi) beyond Earth''s orbit around the Sun.
        Its actual position varies between about 250,000 and 832,000&nbsp;km (155,000–517,000&nbsp;mi)
        from L2 as it orbits, keeping it out of both Earth and Moon''s shadow. By
        way of comparison, Hubble orbits 550&nbsp;km (340&nbsp;mi) above Earth''s
        surface, and the Moon is roughly 400,000&nbsp;km (250,000&nbsp;mi) from Earth.
        Objects near this Sun–Earth point can orbit the Sun in synchrony with the
        Earth, allowing the telescope to remain at a roughly constant distance with
        continuous orientation of its sunshield and toward the Sun, Earth and Moon.
        Combined with its wide, shadow-avoiding orbit, the telescope can simultaneously
        block incoming heat and light from all three bodies and avoid even the most
        minor changes in temperature from Earth and Moon shadows that would affect
        the structure, while maintaining uninterrupted solar power and Earth communications
        on its Sun-facing side. This arrangement keeps the temperature of the spacecraft
        constant and below the 50&nbsp;K (−223&nbsp;°C; −370&nbsp;°F) necessary for
        faint infrared observations.\\n\\n### Sunshield protection\\n[]\\n\\nMain
        article: \\n\\n_Test unit of the sunshield stacked and expanded at the facility
        in California, 2014_\\n\\nTo make observations in the spectrum, Webb must
        be kept under 50&nbsp;K (−223.2&nbsp;°C; −369.7&nbsp;°F); otherwise, infrared
        radiation from the telescope itself would overwhelm its instruments. Its large
        sunshield blocks light and heat from the Sun, Earth, and Moon, and its position
        near the Sun–Earth L2 keeps all three bodies on the same side of the spacecraft
        at all times. Its halo orbit around the avoids the shadow of the Earth and
        Moon, maintaining a constant environment for the sunshield and solar arrays.
        The resulting stable temperature for the structures on the dark side is critical
        to maintaining precise alignment of the primary mirror segments.\\n\\nThe
        sunshield consists of five layers, each approximately 0.1mm thick. Each layer
        is made of film, coated with aluminum on both sides. The two outermost layers
        have an additional coating of on the Sun-facing sides, to better reflect the
        Sun''s heat into space. The sunshield has an effective sun protection factor,
        or SPF, of 1,000,000, compared to suntan lotion with a range of 8 to 50. Accidental
        tears of the delicate film structure during deployment testing in 2018 led
        to further delays to the telescope deployment.\\n\\nThe sunshield was designed
        to be folded twelve times so that it would fit within the rocket''s , which
        is 4.57&nbsp;m (15.0&nbsp;ft) in diameter, and 16.19&nbsp;m (53.1&nbsp;ft)
        long. The shield''s fully deployed dimensions were planned as 14.162&nbsp;m
        ×&nbsp;21.197&nbsp;m (46.46&nbsp;ft ×&nbsp;69.54&nbsp;ft).\\n\\nKeeping within
        the shadow of the sunshield limits the of Webb at any given time. The telescope
        can see 40 percent of the sky from any one position, but can see all of the
        sky over a period of six months.\\n\\n### Optics\\n[]\\n\\nMain article: \\n\\n_Engineers
        , 2015_\\n\\n_Main mirror assembly from the front with primary mirrors attached,
        November 2016_\\n\\n_due to mirror segments and spider color-coded_\\n\\nWebb''s
        is a 6.5&nbsp;m (21&nbsp;ft)-diameter gold-coated beryllium reflector with
        a collecting area of 25.4&nbsp;m2 (273&nbsp;sq&nbsp;ft). If it had been designed
        as a single, large mirror, it would have been too large for existing launch
        vehicles. The mirror is therefore composed of 18 hexagonal segments (a technique
        pioneered by ), which unfolded after the telescope was launched. Image plane
        via is used to position the at the correct locations using precise . After
        this initial configuration, they only need occasional updates every few days
        to maintain optimal focus. This is unlike terrestrial telescopes, for example
        the , which must continually adjust their mirror segments using to overcome
        the effects of gravitational and wind loading. The Webb telescope uses 132
        small actuation motors to position and adjust the optics. The actuators can
        position the mirror with 10&nbsp; accuracy.\\n\\nWebb''s optical design is
        a , which makes use of curved secondary and tertiary mirrors to deliver images
        that are free from over a wide field. The secondary mirror is 0.74&nbsp;m
        (2.4&nbsp;ft) in diameter. In addition, there is a fine steering mirror which
        can adjust its position many times per second to provide . Point light sources
        in images taken by Webb have six plus two fainter ones, due to the hexagonal
        shape of the primary mirror segments.\\n\\n### Scientific instruments\\n[]\\n\\n_NIRCam
        wrapped up in 2013_\\n\\n_The Calibration Assembly, one component of the NIRSpec
        instrument_\\n\\n_MIRI_\\n\\nThe (ISIM) is a framework that provides electrical
        power, computing resources, cooling capability, and structural stability to
        the Webb telescope. It is made with a bonded graphite-epoxy composite attached
        to the underside of Webb''s telescope structure. The ISIM holds the four science
        instruments and a guide camera.\\n\\n- (Near Infrared Camera) is an which
        has spectral coverage ranging from the edge of the visible (0.6&nbsp;μm) through
        to the (5&nbsp;μm). There are 10 sensors each of 4 megapixels. NIRCam serves
        as the observatory''s wavefront sensor, required for wavefront sensing and
        control activities that align and focus the main mirror segments. NIRCam was
        built by a team led by the , with principal investigator .\\n- (Near Infrared
        Spectrograph) performs over the same wavelength range. It was built by the
        (ESA) at in , Netherlands. The leading development team includes members from
        in Ottobrunn and Friedrichshafen, Germany, and the , with Pierre Ferruit ()
        as NIRSpec project scientist. The NIRSpec design provides three observing
        modes: a low-resolution prism mode, an R~1000 mode, and an R~2700 integral-field
        unit or long-slit spectroscopy mode. Mode switching is performed by operating
        a wavelength preselection mechanism, the Filter Wheel Assembly, and selecting
        a corresponding dispersive element (prism or grating) using the Grating Wheel
        Assembly. Both mechanisms are based on the successful ISOPHOT wheel mechanisms
        of the . The multi-object mode relies on a complex microshutter mechanism
        to enable simultaneous observations of hundreds of individual objects across
        NIRSpec''s field of view. There are two sensors, each of 4 megapixels.\\n-
        (Mid-Infrared Instrument) measures the mid-to-long-infrared wavelength range
        from 5 to 27&nbsp;μm. It contains both a and an imaging . MIRI was developed
        as a collaboration between NASA and a consortium of European countries, and
        is led by (University of Arizona) and (, , Scotland). The temperature of the
        MIRI must not exceed 6&nbsp;K (−267&nbsp;°C; −449&nbsp;°F): a helium gas mechanical
        cooler sited on the warm side of the environmental shield provides this cooling.\\n-
        (Fine Guidance Sensor and Near Infrared Imager and Slitless Spectrograph),
        led by the (CSA) under project scientist John Hutchings (), is used to stabilize
        the line-of-sight of the observatory during science observations. Measurements
        from the FGS are used both to control the spacecraft''s overall orientation
        and to drive the fine steering mirror for image stabilization. The CSA also
        provided a Near Infrared Imager and Slitless Spectrograph (NIRISS) module
        for astronomical imaging and spectroscopy in the 0.8 to 5&nbsp;μm wavelength
        range, led by principal investigator René Doyon at the . Although they are
        often referred together as a unit, the NIRISS and FGS serve entirely different
        purposes, with one being a scientific instrument. The other is a part of the
        observatory''s support infrastructure.\\n\\nNIRCam and MIRI feature starlight-blocking
        for observation of faint targets such as and very close to bright stars.\\n\\n###
        Spacecraft bus\\n[]\\n\\nMain article: \\n\\n_JWST major components: spacecraft
        bus, sunshield, Optical Telescope Element (OTE), and the Integrated Science
        Instrument Module (ISIM)_\\n\\nThe is the primary support component of the
        JWST, hosting a multitude of subsystems for computing, communications, electrical
        power, propulsion, and structure. Along with the sunshield, it forms the spacecraft
        element of the . The spacecraft bus is on the Sun-facing \\\"warm\\\" side
        of the sunshield and operates at a temperature of about 300&nbsp;K (27&nbsp;°C;
        80&nbsp;°F).\\n\\nThe spacecraft bus has a mass of 350&nbsp;kg (770&nbsp;lb)
        and must support the 6,200&nbsp;kg (13,700&nbsp;lb) space telescope. It is
        primarily made of a graphite composite material. The assembly was completed
        in California in 2015. It was integrated with the rest of the space telescope,
        leading to its 2021 launch. The spacecraft bus can rotate the telescope with
        pointing precision of one and isolates vibration to 2 milliarcseconds.\\n\\nWebb
        has two pairs of rocket engines (one pair for redundancy) to make course corrections
        on the way to L2 and for &nbsp;– maintaining the correct position in the halo
        orbit. Eight smaller thrusters are used for &nbsp;– the correct pointing of
        the spacecraft. The engines use fuel (159 liters or 42 U.S. gallons at launch)
        and as oxidizer (79.5 liters or 21.0 U.S. gallons at launch).\\n\\n### Servicing\\n[]\\n\\nWebb
        is not intended to be serviced in space. A crewed mission to repair or upgrade
        the observatory, as was done for Hubble, would not be possible, and according
        to NASA Associate Administrator , despite best efforts, an uncrewed remote
        mission was found to be beyond available technology at the time Webb was designed.
        During the long Webb testing period, NASA officials referred to the idea of
        a servicing mission, but no plans were announced. Since the successful launch,
        NASA has stated that nevertheless limited accommodation was made to facilitate
        future servicing missions. These accommodations included precise guidance
        markers in the form of crosses on the surface of Webb, for use by remote servicing
        missions, as well as refillable fuel tanks, removable heat protectors, and
        accessible attachment points.\\n\\n### Software\\n[]\\n\\nWebb uses a modified
        version of , called Nombas ScriptEase 5.00e, for its operations; it follows
        the standard and \\\"allows for a modular design flow, where on-board scripts
        call lower-level scripts that are defined as functions\\\". Furthermore, \\\"The
        script interpreter is run by the flight software, which is written in . The
        flight software operates the spacecraft and the science instruments.\\\"\\n\\n##
        Comparison with other telescopes\\n[]\\n\\n_Comparison with the primary mirror_\\n\\n_Primary
        mirror size comparison between Webb and Hubble_\\n\\nThe desire for a large
        infrared space telescope is decades old. In the United States, the Space Infrared
        Telescope Facility (later called the ) was planned while the Space Shuttle
        was in development, and the potential for infrared astronomy was acknowledged
        at that time. Unlike ground telescopes, space observatories are free from
        atmospheric absorption of infrared light. Space observatories opened a \\\"new
        sky\\\" for astronomers.\\n\\nHowever, there is a challenge in the design
        of infrared telescopes: they must remain extremely cold, and the longer the
        wavelength of infrared light, the colder they must be. If not, the device''s
        background heat overwhelms the detectors, effectively rendering it blind.
        This can be overcome by careful design. One method is to put the key instruments
        in a with an icy substance, such as . The coolant will slowly vaporize, limiting
        the instrument''s lifetime to as short as a few months or as long as a few
        years.\\n\\nIt is also possible to maintain a low temperature by designing
        the spacecraft to enable near-infrared observations without coolant, as with
        the extended missions of the Spitzer Space Telescope and the , which operated
        at reduced capacity after coolant depletion. Another example is Hubble''s
        (NICMOS) instrument, which started out using a block of that depleted after
        a couple of years, but was then replaced during the servicing mission with
        a that worked continuously. The Webb Space Telescope is designed to cool itself
        without a dewar, using a combination of sunshields and radiators, with the
        mid-infrared instrument using an additional cryocooler.\\n\\nSelected space
        telescopes and instruments| Name | Launch year | (μm) | Aperture (m) | Cooling
        |\\n| --- | --- | --- | --- | --- |\\n| (IRT) | 1985 | 1.7–118 | 0.15 | Helium
        |\\n| (ISO) | 1995 | 2.5–240 | 0.60 | Helium |\\n| Hubble (STIS) | 1997 |
        0.115–1.03 | 2.4 | Passive |\\n| Hubble (NICMOS) | 1997 | 0.8–2.4 | 2.4 |
        Nitrogen, later |\\n| 2003 | 3–180 | 0.85 | Helium |\\n| Hubble (WFC3) | 2009
        | 0.2–1.7 | 2.4 | Passive and thermo-electric |\\n| 2009 | 55–672 | 3.5 |
        Helium |\\n| James Webb Space Telescope | 2021 | 0.6–28.5 | 6.5 | Passive
        and (MIRI) |\\n\\nWebb''s delays and cost increases have been compared to
        those of its predecessor, the . When Hubble formally began in 1972, it had
        an estimated development cost of US$300 million (equivalent to $2,309,069,000
        in 2025), but by the time it was launched in 1990, the cost was about four
        times that. In addition, new instruments and servicing missions increased
        the price to at least US$9 billion by 2006 (equivalent to $14,373,556,000
        in 2025).\\n\\n## Development history\\n[]\\n\\nFor a chronological guide,
        see .\\n\\n### Background (development to 2003)\\n[]\\n\\nMajor milestones|
        Year | Milestone |\\n| --- | --- |\\n| 1996 | Next Generation Space Telescope
        project first proposed (mirror size: 8 m) |\\n| 2001 | NEXUS Space Telescope,
        a precursor to the Next Generation Space Telescope, cancelled |\\n| 2002 |
        Proposed project renamed James Webb Space Telescope, (mirror size reduced
        to 6 m) |\\n| 2003 | awarded contract to build telescope |\\n| 2007 | signed
        between NASA and ESA |\\n| 2010 | Mission Critical Design Review (MCDR) passed
        |\\n| 2011 | Proposed cancellation |\\n| 2016 | Final assembly completed |\\n|
        25 Dec 2021 | Launch |\\n\\nDiscussions of a Hubble follow-on started in the
        1980s, but serious planning began in the early 1990s. The _Hi-Z_ telescope
        concept was developed between 1989 and 1994: a fully baffled 4&nbsp;m (13&nbsp;ft)
        aperture infrared telescope that would recede to an orbit at 3 (AU). This
        distant orbit would have benefited from reduced light noise from . Other early
        plans called for a NEXUS precursor telescope mission.\\n\\nCorrecting the
        of the Hubble Space Telescope (HST) in its first years played a significant
        role in the birth of Webb. In 1993, NASA conducted , that replaced HST''s
        camera and installed a retrofit for its imaging spectrograph to compensate
        for the in its .\\n\\nThe HST & Beyond Committee was formed in 1994 \\\"to
        study possible missions and programs for optical-ultraviolet astronomy in
        space for the first decades of the 21st century\\\". Emboldened by HST''s
        success, its 1996 report explored the concept of a larger and much colder,
        infrared-sensitive telescope that could reach back in cosmic time to the birth
        of the first galaxies. This high-priority science goal was beyond the HST''s
        capability because, as a warm telescope, it is blinded by infrared emission
        from its own optical system. In addition to recommendations to extend the
        HST mission to 2005 and to develop technologies for finding planets around
        other stars, NASA embraced the chief recommendation of HST & Beyond for a
        large, cold space telescope (radiatively cooled far below 0&nbsp;°C), and
        began the planning process for the future Webb telescope.\\n\\nPreparation
        for the 2000 (a literature review produced by the that includes identifying
        research priorities and making recommendations for the upcoming decade) included
        further development of the scientific program for what became known as the
        Next Generation Space Telescope, and advancements in relevant technologies
        by NASA. As it matured, studying the birth of galaxies in the young and searching
        for planets around other stars&nbsp;– the prime goals coalesced into \\\"Origins\\\"
        by HST & Beyond becoming prominent.\\n\\nAs hoped, the NGST received the highest
        ranking in the 2000 Decadal Survey.\\n\\nAn , , coined the phrase \\\"\\\",
        and opted for the next big paradigm shift for astronomy, namely, breaking
        the barrier of a single mirror. That meant going from \\\"eliminate moving
        parts\\\" to \\\"learn to live with moving parts\\\" (e.g., segmented optics).
        Seeking to reduce the mirror mass by a factor of 10, was selected as the mirror
        substrate because the metal is low density (1.845 g/cm3), exceptionally stiff,
        and maintains a stable shape at cryogenic temperatures.\\n\\nThe mid-1990s
        era of \\\"faster, better, cheaper\\\" produced the NGST concept, with an
        8&nbsp;m (26&nbsp;ft) aperture to be flown to , roughly estimated to cost
        US$500 million. In 1997, NASA worked with the Goddard Space Flight Center,,
        and to conduct technical requirement and cost studies of the three different
        concepts, and in 1999 selected and TRW for preliminary concept studies. Launch
        was at that time planned for 2007, but the launch date was pushed back many
        times (see table ).\\n\\nIn 2002, the project was renamed after NASA''s second
        administrator (1961–1968), (1906–1992). Webb led the agency during the and
        established scientific research as a core NASA activity.\\n\\nIn 2003, NASA
        awarded TRW the US$824.8 million prime contract for the Webb telescope. The
        design called for a de-scoped 6.1&nbsp;m (20&nbsp;ft) primary mirror and a
        launch date of 2010. Later that year, TRW was acquired by in a hostile bid
        and became Northrop Grumman Space Technology.\\n\\n### Early development and
        replanning (2003–2007)\\n[]\\n\\n_Early full-scale model on display at NASA
        (2005)_\\n\\nDevelopment was managed by NASA''s Goddard Space Flight Center
        in Greenbelt, Maryland, with as its project scientist. The primary contractor
        was Northrop Grumman Aerospace Systems, responsible for developing and building
        the spacecraft element, which included the , sunshield, Deployable Tower Assembly
        (DTA) which connects the to the spacecraft bus, and the Mid Boom Assembly
        (MBA) which helps to deploy the large sunshields on orbit, while was subcontracted
        to develop and build the OTE itself, and the (ISIM).\\n\\nCost growth revealed
        in spring 2005 led to a re-planning in August 2005. The primary technical
        outcomes of the re-planning were significant changes in the integration and
        test plans, a 22-month launch delay (from 2011 to 2013), and elimination of
        system-level testing for observatory modes at wavelengths shorter than 1.7&nbsp;μm.
        Other major features of the observatory were unchanged. Following the re-planning,
        the project was independently reviewed in April 2006.\\n\\nIn the 2005 re-plan,
        the project''s life-cycle cost was estimated at US$4.5 billion. This comprised
        approximately US$3.5 billion for design, development, launch, and commissioning,
        and approximately US$1.0 billion for ten years of operations. The ESA agreed
        in 2004 to contributing about €300 million, including the launch. The CSA
        pledged CA$39 million in 2007 and in 2012 delivered its contributions in equipment
        to point the telescope and detect atmospheric conditions on distant planets.\\n\\n###
        Detailed design and construction (2007–2021)\\n[]\\n\\nA JWST mirror segment,
        2010\\n\\nMirror segments undergoing tests at the X-ray & Cryogenic Facility
        at \\n\\nThe assembled telescope following environmental testing\\n\\nIn January
        2007, nine of the ten technology development items in the project successfully
        passed a Non-Advocate Review. These technologies were deemed sufficiently
        mature to mitigate significant risks in the project. The remaining technology
        development item (the cryocooler) completed its technology maturation milestone
        in April 2007. This technology review represented the beginning step in the
        process that ultimately moved the project into its detailed design phase (Phase
        C). By May 2007, costs were still on target. In March 2008, the project completed
        its Preliminary Design Review (PDR). In April 2008, the project passed the
        Non-Advocate Review. Other past reviews include the review in March 2009,
        the review completed in October 2009, and the Sunshield review completed in
        January 2010.\\n\\nIn April 2010, the telescope passed the technical portion
        of its Mission Critical Design Review (MCDR). Passing the MCDR signified that
        the integrated observatory could meet all science and engineering requirements
        for its mission. The MCDR encompassed all previous design reviews. The project
        schedule underwent review during the months following the MCDR through the
        Independent Comprehensive Review Panel, which led to a re-plan of the mission
        aiming for a 2015 launch, but it was not until 2018. By 2010, cost overruns
        were impacting other projects, though Webb itself remained on schedule.\\n\\nBy
        2011, the Webb project was in the final design and fabrication phase (Phase
        C).\\n\\nAssembly of the hexagonal segments of the primary mirror, which was
        done via robotic arm, began in November 2015 and was completed on 3 February
        2016. The secondary mirror was installed on 3 March 2016. Final construction
        of the Webb telescope was completed in November 2016, after which extensive
        testing procedures began.\\n\\nIn March 2018, NASA delayed Webb''s launch
        by an additional 2 years to May 2020 after the telescope''s sunshield ripped
        during a practice deployment, and its cables did not sufficiently tighten.
        In June 2018, NASA delayed the launch by an additional 10 months to March
        2021, based on the independent review board''s assessment following the failed
        March 2018 test deployment. The review identified that Webb launch and deployment
        had 344 potential – tasks that had no alternative or means of recovery if
        unsuccessful, and therefore had to succeed for the telescope to work. In August
        2019, the mechanical integration of the telescope was completed, something
        that was scheduled to be done 12 years before in 2007.\\n\\nAfter construction
        was completed, Webb underwent final tests at Northrop Grumman''s historic
        in Redondo Beach, California. A ship carrying the telescope left California
        on 26 September 2021, passed through the , and arrived in on 12 October 2021.\\n\\n###
        Cost and schedule issues\\n[]\\n\\nNASA''s lifetime cost for the project is[]
        expected to be US$9.7 billion, of which US$8.8 billion was spent on spacecraft
        design and development, and US$861 million is planned to support five years
        of mission operations. Representatives from ESA and CSA stated their project
        contributions amount to approximately €700&nbsp;million and CA$200 million,
        respectively.\\n\\nA 1984 study by the Space Science Board estimated that
        building a next-generation infrared observatory in orbit would cost US$4 billion
        (US$7B in 2006 dollars, or US$ 10B in 2020 dollars). While this came close
        to the final cost of Webb, the first NASA design considered in the late 1990s
        was more modest, aiming for a $1&nbsp;billion price tag over 10 years of construction.
        Over time, this design expanded, added funding for contingencies, and had
        scheduling delays.\\n\\nProgression of estimates for schedule and cost, along
        with major milestones| Year | Plannedlaunch | Budget plan(billion USD) |\\n|
        --- | --- | --- |\\n| 1998 | 2007 | 1 |\\n| 2000 | 2009 | 1.8 |\\n| 2002 |
        2010 | 2.5 |\\n| 2003 | 2011 | 2.5 |\\n| 2005 | 2013 | 3 |\\n| 2006 | 2014
        | 4.5 |\\n| 2008: Preliminary Design Review |\\n| 2008 | 2014 | 5.1 |\\n|
        2010: Critical Design Review |\\n| 2010 | 2015 to 2016 | 6.5 |\\n| 2011 |
        2018 | 8.7 |\\n| 2017 | 2019 | 8.8 |\\n| 2018 | 2020 | ≥8.8 |\\n| 2019 | March
        2021 | 9.66 |\\n| 2021 | Dec 2021 | 9.70 |\\n\\nBy 2008, when the project
        entered preliminary design review and was formally confirmed for construction,
        over US$1 billion had already been spent on developing the telescope, and
        the total budget was estimated at US$5 billion (equivalent to $8.24&nbsp;billion
        in 2025). In summer 2010, the mission passed its Critical Design Review (CDR)
        with excellent grades on all technical matters. Still, schedule and cost slips
        at that time prompted Maryland U.S. Senator to call for an external review
        of the project. The Independent Comprehensive Review Panel (ICRP), chaired
        by J. Casani (JPL), found that the earliest possible launch date was late
        2015, at an additional cost of US$1.5 billion (bringing the total to US$6.5
        billion). They also noted that this would have required additional funding
        in FY2011 and FY2012, and that a later launch date would result in a higher
        total cost.\\n\\nOn 6 July 2011, the United States House of Representatives''
        appropriations committee on Commerce, Justice, and Science moved to cancel
        the James Webb project by proposing an FY2012 budget that removed US$1.9 billion
        from NASA''s overall budget, of which roughly one quarter was for Webb. US$3
        billion had been spent and 75% of its hardware was in production. This budget
        proposal was approved by subcommittee vote the following day. The committee
        charged that the project was \\\"billions of dollars over budget and plagued
        by poor management\\\". In response, the stated support of Webb, as did Senator
        Mikulski. A number of editorials supporting Webb appeared in the international
        press during 2011 as well. In November 2011, Congress reversed plans to cancel
        Webb and instead capped additional funding to complete the project at US$8
        billion.\\n\\nWhile similar issues had affected other major NASA projects
        such as the Hubble telescope, some scientists expressed concerns about growing
        costs and schedule delays for the Webb telescope, worrying that its budget
        might be competing with those of other space science programs. A 2010 _Nature_
        article described Webb as \\\"the telescope that ate astronomy\\\". NASA continued
        to defend the budget and timeline of the program to Congress.\\n\\nIn 2018,
        was appointed as the new director of the Webb program. Robinson was credited
        with raising the program''s schedule efficiency (how many measures were completed
        on time) from 50% to 95%. For his role in improving the performance of the
        Webb program, Robinsons''s supervisor, , called him \\\"the most effective
        leader of a mission I have ever seen in the history of NASA\\\". In July 2022,
        after Webb''s commissioning process was complete and it began transmitting
        its first data, Robinson retired following a 33-year career at NASA.\\n\\nOn
        27 March 2018, NASA pushed back the launch to May 2020 or later, with a final
        cost estimate to come after a new launch window was determined with the ESA.
        In 2019, its mission cost cap was increased by US$800 million. After launch
        windows were paused in 2020 due to the , Webb was launched at the end of 2021,
        with a total cost of just under US$10 billion.\\n\\nNo single area drove the
        cost. For future large telescopes, there are five major areas critical to
        controlling overall cost:\\n\\n- System complexity\\n- Critical path and \\n-
        Verification challenges\\n- Programmatic constraints\\n- Early integration
        and test considerations\\n\\n### Partnership\\n[]\\n\\nNASA, ESA, and CSA
        have collaborated on the telescope since 1996. ESA''s participation in construction
        and launch was approved by its members in 2003, and an agreement was signed
        between ESA and NASA in 2007. In exchange for full partnership, representation,
        and access to the observatory for its astronomers, ESA is providing the NIRSpec
        instrument, the Optical Bench Assembly of the MIRI instrument, an launcher,
        and a workforce to support operations. The CSA provided the Fine Guidance
        Sensor and the Near-Infrared Imager Slitless Spectrograph and workforce to
        support operations.\\n\\nSeveral thousand scientists, engineers, and technicians
        spanning 15 countries have contributed to the build, test, and integration
        of Webb. A total of 258 companies, government agencies, and academic institutions
        participated in the pre-launch project; 142 from the United States, 104 from
        12 European countries (including 21 from the U.K., 16 from France, 12 from
        Germany and 7 international), and 12 from Canada. Other countries as NASA
        partners, such as Australia, were involved in post-launch operation.\\n\\nParticipating
        countries:\\n\\n- &nbsp;\\n- &nbsp;\\n- &nbsp;\\n- &nbsp;\\n- &nbsp;\\n- &nbsp;\\n-
        &nbsp;\\n- &nbsp;\\n- &nbsp;\\n- &nbsp;\\n- &nbsp;\\n- &nbsp;\\n- &nbsp;\\n-
        &nbsp;\\n- &nbsp;\\n- &nbsp;\\n- &nbsp;\\n- &nbsp;&nbsp;\\n- &nbsp;\\n- &nbsp;\\n\\n###
        Naming concerns\\n[]\\n\\nSee also: , and \\n\\nIn 2002, NASA administrator
        (2001–2004) decided to name the telescope after , the administrator of NASA
        from 1961 to 1968 during the , , and much of the .\\n\\nIn 2015, concerns
        were raised around Webb''s possible role in the , the mid-20th-century persecution
        by the U.S. government targeting in . In 2022, NASA released a report of an
        investigation, based on an examination of more than 50,000 documents. The
        report found \\\"no available evidence directly links Webb to any actions
        or follow-up related to the firing of individuals for their sexual orientation\\\",
        either in his time in the State Department or at NASA.\\n\\n## Mission goals\\n[]\\n\\nThe
        James Webb Space Telescope has four key goals:\\n\\n- to search for light
        from the first stars and galaxies that formed in the universe after the Big
        Bang\\n- to study \\n- to understand and \\n- to study planetary systems and
        the \\n\\nThese goals can be achieved more effectively through near-infrared
        observation rather than in the visible spectrum. For this reason, Webb''s
        instruments will not measure visible or ultraviolet light like the Hubble
        Telescope, but will have a much greater capacity to perform . Webb will be
        sensitive to a range of wavelengths from 0.6 to 28&nbsp;μm (corresponding
        respectively to orange light and deep infrared radiation at about 100&nbsp;K
        or −173&nbsp;°C).\\n\\nWebb may be used to gather information on the dimming
        of the star , which was discovered in 2015 and shows some abnormal light-curve
        properties.\\n\\nAdditionally, it will be able to tell if an exoplanet has
        methane in its atmosphere, allowing astronomers to determine whether or not
        the methane is a .\\n\\n### Orbit design\\n[]\\n\\n_Webb is not exactly at
        the L2 point, but circles around it in a ._\\n\\n_Alternative views of the
        , comparing ultraviolet and visible (top) and infrared (bottom) astronomy.
        Far more stars are visible in the latter._\\n\\nWebb orbits the Sun near the
        second (L2) of the Sun–Earth system, which is 1,500,000&nbsp;km (930,000&nbsp;mi)
        farther from the Sun than the Earth''s orbit, and about four times farther
        than the Moon''s orbit. Usually, an object circling the Sun farther out than
        Earth would take longer than one year to complete its orbit. But near the
        point, the combined gravitational pull of the Earth and the Sun allows a spacecraft
        to orbit the Sun in the same time it takes the Earth to orbit the Sun. Staying
        close to Earth allows much higher data rates for a given antenna size.\\n\\nThe
        telescope circles about the Sun–Earth L2 point in a , which is inclined with
        respect to the , has a radius varying between about 250,000&nbsp;km (160,000&nbsp;mi)
        and 832,000&nbsp;km (517,000&nbsp;mi), and takes about half a year to complete.
        Since L2 is just an equilibrium point with no gravitational pull, a halo orbit
        is not an orbit in the usual sense: the spacecraft is actually in orbit around
        the Sun. The halo orbit can be thought of as controlled drifting to remain
        in the vicinity of the L2 point. This requires some : around 2.5&nbsp;m/s
        per year from the total budget of 93&nbsp;m/s.: 10  Two sets of thrusters
        constitute the observatory''s propulsion system. Because the thrusters are
        located solely on the Sun-facing side of the observatory, all station-keeping
        operations are designed to slightly undershoot the required amount of thrust
        in order to avoid pushing Webb beyond the semi-stable point, a situation which
        would be unrecoverable. Randy Kimble, the Integration and Test Project Scientist
        for the JWST, compared the precise station-keeping of Webb to \\\" [...] rolling
        this rock up the gentle slope near the top of the hill – we never want it
        to roll over the crest and get away from him\\\".\\n\\nAnimation of James
        Webb Space Telescope trajectory\\n\\nTop view\\n\\nSide view\\n\\nSide view
        from the Sun\\n\\n&nbsp;&nbsp;James Webb Space Telescope&nbsp; **·** &nbsp;&nbsp;&nbsp;
        **·** &nbsp;&nbsp;L2 point\\n\\n### Infrared astronomy\\n[]\\n\\n_Infrared
        observations can see objects hidden in visible light, such as the shown here._\\n\\n_Atmospheric
        windows in the infrared: Much of this type of light is blocked when viewed
        from the Earth''s surface. It would be like looking at a rainbow but only
        seeing one color._\\n\\nWebb is the formal successor to the Hubble Space Telescope
        (HST), and since its primary emphasis is on , it is also a successor to the
        . Webb will far surpass both those telescopes, enabling it to see many more,
        and much older, stars and galaxies. Observing in the infrared spectrum is
        a key technique for achieving this, because of , and because it better penetrates
        obscuring dust and gas. This allows observation of dimmer, cooler objects.
        Since water vapor and carbon dioxide in Earth''s atmosphere strongly absorb
        most infrared radiation, ground-based infrared astronomy is limited to narrow
        wavelength ranges where the atmosphere absorbs less strongly. Additionally,
        the atmosphere itself radiates in the infrared, often overwhelming the light
        from the observed object. This makes a space telescope preferable for infrared
        observation.\\n\\nThe more distant an object is, the younger it appears; its
        light has taken longer to reach human observers. Because the , as light travels,
        it becomes redshifted, and objects at great distances are therefore easier
        to see in the infrared. Webb''s infrared capabilities are expected to let
        it see back in time to the first galaxies forming just a few hundred million
        years after the Big Bang.\\n\\nInfrared radiation can pass more freely through
        regions of that scatter visible light. Observations in infrared allow the
        study of objects and regions of space which would be obscured by gas and dust
        in the , such as the where stars are born, the that give rise to planets,
        and the cores of .\\n\\nRelatively calm objects (temperatures less than several
        thousand degrees) emit their radiation primarily in the infrared, as described
        by . As a result, most objects that are cooler than stars are better studied
        in the infrared. This includes the clouds of the , , both in our own and other
        solar systems, , and that will be observed with the Mid-Infrared Instrument
        (MIRI).\\n\\nSome of the missions in infrared astronomy that impacted Webb
        development were and the (WMAP). Spitzer showed the importance of mid-infrared,
        which is helpful for tasks such as observing dust disks around stars. Also,
        the WMAP probe showed the universe was \\\"lit up\\\" at redshift 17, further
        underscoring the importance of the mid-infrared. Both these missions were
        launched in the early 2000s, in time to influence Webb development.\\n\\n##
        Ground support and operations\\n[]\\n\\nThe (STScI), in , on the , was selected
        in 2003 as the Science and Operations Center (S&OC) for Webb with an initial
        budget of US$162.2 million intended to support operations through the first
        year after launch. In this capacity, STScI was to be responsible for the scientific
        operation of the telescope and delivery of data products to the astronomical
        community. Data was to be transmitted from Webb to the ground via the , processed
        and calibrated at STScI, and then distributed online to astronomers worldwide.
        As with Hubble, anyone, anywhere in the world, will be allowed to submit proposals
        for observations. Each year, several astronomy committees will submitted proposals
        to select the projects to observe the following year. The authors of the selected
        proposals will typically have 1 year of private access to the new observations,
        after which the data will become publicly available for download from the
        STScI online archive.\\n\\nThe bandwidth and digital throughput of the satellite
        are designed to operate at 458 gigabits of data per day for the length of
        the mission (equivalent to a sustained rate of 5.42 ). Most of the data processing
        on the telescope is done by conventional single-board computers. The digitization
        of the analog data from the instruments is performed by the custom SIDECAR
        ASIC (System for Image Digitization, Enhancement, Control And Retrieval ).
        NASA stated that the SIDECAR ASIC will include all the functions of a 9.1&nbsp;kg
        (20&nbsp;lb) instrument box in a 3&nbsp;cm (1.2&nbsp;in) package and consume
        only 11&nbsp;milliwatts of power. Since this conversion must be done close
        to the detectors, on the cold side of the telescope, the low power dissipation
        is crucial for maintaining the low temperature required for optimal operation
        of Webb.\\n\\nThe telescope is equipped with a (SSD) with a capacity of 68&nbsp;GB,
        used as temporary storage for data collected from its scientific instruments.
        By the end of the 10-year mission, the usable capacity of the drive is expected
        to decrease to 60&nbsp;GB due to radiation and read/write operations.\\n\\n###
        Micrometeoroid strikes\\n[]\\n\\nThe C3 mirror segment suffered a strike from
        a large dust mote-sized particle between 23 and 25 May 2022, the fifth and
        largest strike since launch, reported 8 June 2022, which required engineers
        to compensate for the strike using a mirror actuator. Despite the strike,
        a NASA characterization report states \\\"all JWST observing modes have been
        reviewed and confirmed to be ready for science use\\\" as of 10 July 2022.
        Micrometeoroids strike Webb an average of once or twice per month, and only
        the May 2022 strike caused noticeable damage. After that strike, mission personnel
        implemented a strategy to change Webb''s observations to reduce the risk of
        further damage. The strategy is to avoid pointing the mirror toward \\\"micrometeoroid
        avoidance zones\\\" at particular points along Webb''s orbit.\\n\\n## Launch
        and commissioning\\n[]\\n\\nMain article: \\n\\n### Launch\\n[]\\n\\nMain
        article: \\n\\nThe launch (designated ) took place as scheduled at 12:20 UTC
        on 25 December 2021 on an rocket that lifted off from the in . The telescope
        was confirmed to be receiving power, starting a two-week deployment phase
        of its parts and traveling to its target destination. The telescope was released
        from the upper stage 27 minutes 7 seconds after launch, beginning a 30-day
        adjustment to place the telescope in a around the .\\n\\nThe telescope was
        launched with slightly less speed than needed to reach its final orbit, and
        slowed as it travelled away from Earth, so it reached L2 with only the velocity
        needed to enter its orbit there. The telescope reached L2 on 24 January 2022.
        The flight included three planned course corrections to adjust its speed and
        direction. This is because the observatory could recover from underthrust
        (going too slowly), but could not recover from overthrust (going too fast)–
        to protect highly temperature-sensitive instruments, the sunshield must remain
        between the telescope and the Sun, so the spacecraft could not turn around
        or use its thrusters to slow down.\\n\\nAn orbit is , so JWST needs to use
        propellant to maintain its halo orbit around L2 (known as ) to prevent the
        telescope from drifting away from its orbital position. It was designed to
        carry enough propellant for 10 years, but the precision of the Ariane 5 launch
        and the first midcourse correction were credited with saving enough onboard
        fuel that JWST may be able to maintain its orbit for around 20 years instead.
        called the launch \\\"flawless\\\".\\n\\n- \\nDiagram of Webb inside Ariane
        5\\n- \\nAriane 5 and Webb at the launch pad\\n- \\nAriane 5 containing the
        James Webb Space Telescope lifting off from the launch pad\\n- \\nAriane 5
        containing Webb moments after lift-off\\n- \\nWebb as seen from the shortly
        after separation, approximately 29 minutes after launch. Part of the Earth
        with the is visible in the background of the image.\\n\\n### Transit and structural
        deployment\\n[]\\n\\n_Structural deployment timeline_\\n\\nWebb was released
        from the rocket upper stage 27 minutes after a flawless launch. Starting 31
        minutes after launch, and continuing for about 13 days, Webb began the process
        of deploying its solar array, antenna, sunshield, and mirrors. Nearly all
        deployment actions are commanded by the Space Telescope Science Institute
        in , Maryland, except for two early automatic steps, solar panel unfolding
        and communication antenna deployment. The mission was designed to give ground
        controllers flexibility to change or modify the deployment sequence in case
        of problems.\\n\\n_Structural deployment sequence_\\n\\nAt 7:50&nbsp;p.m.
        EST on 25 December 2021, about 12 hours after launch, the telescope''s pair
        of primary rockets began firing for 65 minutes to make the first of three
        planned mid-course corrections. On day two, the high-gain communication antenna
        deployed automatically.\\n\\nOn 27 December 2021, at 60 hours after launch,
        Webb''s rockets fired for nine minutes and 27 seconds to make the second of
        three mid-course corrections for the telescope to arrive at its L2 destination.
        On 28 December 2021, three days after launch, mission controllers began the
        multi-day deployment of Webb''s all-important sunshield. On 30 December 2021,
        controllers completed two more steps in the observatory''s unpacking. First,
        commands deployed the aft \\\"momentum flap\\\", a device that provides balance
        against solar pressure on the sunshield, saving fuel by reducing the need
        for thruster firing to maintain Webb''s orientation.\\n\\nOn 31 December 2021,
        the ground team extended the two telescoping \\\"mid booms\\\" from the left
        and right sides of the observatory. The left side deployed in 3 hours and
        19 minutes; the right side took 3 hours and 42 minutes. Commands to separate
        and tension the membranes followed between 3 and 4 January and were successful.
        On 5 January 2022, mission control successfully deployed the telescope''s
        secondary mirror, which locked itself into place to a tolerance of about one
        and a half millimeters.\\n\\nThe final step in structural deployment was to
        unfold the primary mirror''s wings. Each panel consists of three primary mirror
        segments and must be folded to allow the space telescope to be installed in
        the of the Ariane rocket for launch. On 7 January 2022, NASA deployed and
        locked in place the port-side wing, and on 8 January, the starboard-side mirror
        wing. This completed the structural deployment of the observatory.\\n\\nOn
        24 January 2022, at 2:00&nbsp;p.m. Eastern Standard Time, nearly a month after
        launch, a third and final course correction took place, inserting Webb into
        its planned around the Sun–Earth L2 point.\\n\\nThe MIRI instrument has four
        observing modes– imaging, low-resolution spectroscopy, medium-resolution spectroscopy,
        and coronagraphic imaging. \\\"On Aug. 24, a mechanism that supports medium-resolution
        spectroscopy (MRS) exhibited what appears to be increased friction during
        setup for a science observation. This mechanism is a grating wheel that allows
        scientists to select between short, medium, and longer wavelengths when making
        observations using the MRS mode\\\", said NASA in a press statement.\\n\\n_Animation
        of Webb''s halo orbit_\\n\\n### Commissioning and testing\\n[]\\n\\nOn 12
        January 2022, while still in transit, mirror alignment began. The primary
        mirror segments and the secondary mirror were moved away from their protective
        launch positions. This took about 10 days, because the 132 motors are designed
        to fine-tune the mirror positions at microscopic accuracy (10 increments)
        and must each move over 1.2 million increments (12.5&nbsp;mm) during initial
        alignment.\\n\\nMirror alignment requires each of the 18 mirror segments and
        the secondary mirror to be positioned to within 50 nanometers. NASA compares
        the accuracy needed by analogy: \\\"If the Webb primary mirror were the size
        of the United States, each [mirror] segment would be the size of Texas, and
        the team would need to line the height of those Texas-sized segments up with
        each other to an accuracy of about 1.5 inches\\\".\\n\\n- James Webb Space
        Telescope Mirror alignment animations\\n- \\nSegment image identification.
        18 mirror segments are moved to determine which segment creates which segment
        image. After matching the mirror segments to their respective photos, the
        mirrors are tilted to align all images around a common point for further analysis.\\n-
        \\nSegment alignment begins by defocusing the segment images by moving the
        secondary mirror slightly. Mathematical analysis, known as phase retrieval,
        is applied to defocused photos to determine the precise positioning errors
        of the segments. Adjusting the segments then yields 18 well-corrected \\\"telescopes\\\".
        However, the segments still do not work together as a single mirror.\\n- \\nImage
        stacking. To put all the light in a single place, each segment image must
        be stacked on top of the others. In the image-stacking step, the individual
        segment images are shifted so they fall precisely at the center of the field,
        producing a single unified image. This process prepares the telescope for
        coarse phasing.\\n- \\nTelescope alignment over instrument fields of view.
        After fine phasing, the telescope is well aligned at a single location in
        the NIRCam field of view. Next, the alignment must be extended to the remaining
        instruments.\\n\\nMirror alignment was a complex operation split into seven
        phases, repeatedly rehearsed using a 1:6-scale model of the telescope. Once
        the mirrors reached 120&nbsp;K (−153&nbsp;°C; −244&nbsp;°F), targeted the
        7th-magnitude star HD 84406 in . To do this, NIRCam took 1560 images of the
        sky and used these wide-ranging images to determine where in the sky each
        segment of the main mirror initially pointed. At first, the individual primary
        mirror segments were greatly misaligned, so the image contained 18 separate,
        blurry images of the star field, each containing an image of the target star.
        The 18 images of HD 84406 are matched to their respective mirror segments,
        and the 18 segments are brought into approximate alignment centered on the
        star (\\\"Segment Image Identification\\\"). Each segment was then corrected
        for its major focusing errors using a technique called , yielding 18 high-quality
        images from the 18 mirror segments (\\\"Segment Alignment\\\"). The 18 images
        from each segment were then moved so they precisely overlap to create a single
        image (\\\"Image Stacking\\\").\\n\\nWith the mirrors positioned to produce
        almost correct images, they had to be fine-tuned to an operational accuracy
        of 50 nanometers, less than one of the light that will be detected. A technique
        called _dispersed fringe sensing_ was used to compare images from 20 pairings
        of mirrors, allowing most of the errors to be corrected (\\\"Coarse Phasing\\\"),
        and then introduced light defocus to each segment''s image, allowing detection
        and correction of almost all remaining errors (\\\"Fine Phasing\\\"). These
        two processes were repeated three times, and Fine Phasing will be routinely
        checked throughout the telescope''s operation. After three rounds of Coarse
        and Fine Phasing, the telescope was well aligned at a single location in the
        NIRCam field of view. Measurements will be made at various points in the captured
        image across all instruments, and corrections will be calculated from the
        detected intensity variations, yielding a well-aligned outcome across all
        instruments (\\\"Telescope Alignment Over Instrument Fields of View\\\").
        Finally, a final round of Fine Phasing and image-quality checks on all instruments
        was performed to ensure that any remaining small residual errors from the
        previous steps were corrected (\\\"Iterate Alignment for Final Correction\\\").
        The telescope''s mirror segments were then aligned, allowing it to capture
        precise, focused images.\\n\\nIn preparation for alignment, NASA announced
        at 19:28 UTC on 3 February 2022, that NIRCam had detected the telescope''s
        first (although not yet complete images). On 11 February 2022, NASA announced
        the telescope had almost completed phase 1 of alignment, with every segment
        of its primary mirror having located and imaged the target star HD 84406,
        and all segments brought into approximate alignment. Phase 1 alignment was
        completed on 18 February 2022, and a week later, phases 2 and 3 were also
        completed. This meant the 18 segments were working in unison, however until
        all 7 phases are complete, the segments were still acting as 18 smaller telescopes
        rather than one larger one. At the same time as the primary mirror was being
        commissioned, hundreds of other instrument commissioning and calibration tasks
        were also ongoing.\\n\\n- \\nPhase 1 interim image, annotated with the related
        mirror segments that took each image\\n- \\nPhase 1 annotated completion image
        of HD 84406\\n- \\nPhase 2 completion, showing \\\"before and after\\\" effects
        of segment alignment\\n- \\nPhase 3 completion, showing 18 segments \\\"stacked\\\"
        as a single image of HD 84406\\n- \\nStar 2MASS J17554042+6551277 captured
        by the NIRCam instrument\\n- \\nA \\\"selfie\\\" taken by the NIRCam during
        the alignment process\\n- \\nImage comparison between \\\"old\\\" and new
        Webb\\n- \\nAlignment of the NASA/ESA/CSA James Webb Space Telescope''s sensors\\n-
        \\nWebb''s Fine Guidance Sensor (FGS)\\n\\n## Allocation of observation time\\n[]\\n\\nWebb
        observing time is allocated through a General Observers (GO) program, a Guaranteed
        Time Observations (GTO) program, a Director''s Discretionary Early Release
        Science (DD-ERS) program, a calibration program, and a Director''s Discretionary
        Time (DDT) program. The GTO program provides guaranteed observing time for
        scientists who developed hardware and software components for the observatory.
        The GO program provides all astronomers the opportunity to apply for observing
        time and will represent the bulk of the observing time. GO programs are selected
        through peer review by a Time Allocation Committee (TAC), similar to the proposal
        review process used for the Hubble Space Telescope. The DDT program is used
        for time-critical observations.\\n\\n### Early Release Science program\\n[]\\n\\nIn
        November 2017, the Space Telescope Science Institute announced the selection
        of 13 Director''s Discretionary Early Release Science (DD-ERS) programs, chosen
        through a competitive proposal process. The observations for these programs&nbsp;–
        **Early Release Observations** (ERO) – were to be obtained during the first
        five months of Webb science operations after the end of the commissioning
        period. A total of 460 hours of observing time was awarded to these 13 programs,
        which span science topics including the , , and , nearby and distant , , and
        . These 13 ERS programs were to use a total of 242.8 hours of telescope observing
        time (excluding Webb overheads and time).\\n\\nEarly Release Science programs|
        Name | Category | Observation time (hours) |\\n| --- | --- | --- |\\n| Radiative
        Feedback from Massive Stars as Traced by Multiband Imaging and Spectroscopic
